cases:
  - id: fc_compound_conflict_media
    category: compound_question
    question: "いおりと喧嘩した日はいつ？その日の前後の日は写真から何をしていた？"
    backend: mock
    analysis_mode: private_full_range
    date_scope: auto
    expected_intents:
      - conflict_dates_with_surrounding_media
    required_observation_types:
      - question_decomposition
      - conflict_candidate_dates
      - surrounding_media_windows
      - surrounding_media_analysis
      - final_answer_verification
    expected_task_order:
      - find_conflict_candidate_dates
      - build_surrounding_media_windows
      - analyze_surrounding_media
    required_sections:
      - 要約
      - 質問分解
      - 喧嘩/すれ違い候補日
      - 前日/当日/翌日の写真分析
      - 注意
    required_substrings:
      - "Q2はQ1"
      - "source_ref:"
    require_source_refs: true
    max_date_range_violations: 0
    max_safety_violations: 0

