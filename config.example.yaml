app:
  name: relationship_lifelog_agent
  mode: private
  host: 127.0.0.1
  port: 7862
  allow_external_api: false
  allow_model_auto_download: false
  allow_gradio_share: false

adapter:
  backend: mock
  upstream_access_mode: readonly
  prefer: auto
  allow_sqlite_readonly: true
  allow_cli_subprocess: true
  allow_python_import: true
  copy_raw_upstream_data: false

analysis:
  mode: "safe_window"
  default_scope: "ask_llm"
  max_runtime_seconds: 300
  max_llm_calls: 20
  max_tool_calls: 50
  allow_full_corpus: true
  allow_full_range: true
  allow_single_context_full_prompt: true
  allow_iterative_full_scan: true
  full_scan:
    batch_strategy: "hybrid"
    max_items_per_run: 5000
    max_items_per_batch: 200
    max_chars_per_batch: 80000
    overlap_items: 5
    max_batches_per_run: 200
    max_reanalysis_rounds: 5
    summarize_after_each_batch: true
    preserve_raw_refs: true

private_full_llm_payload:
  allow_raw_line_text: true
  allow_raw_note_text: true
  allow_photo_paths: true
  allow_exact_gps: true
  allow_face_crops: true
  allow_face_embeddings: true
  allow_raw_face_embedding_values: false
  allow_private_file_paths: true
  allow_unverified_person_candidates: true
  allow_unverified_speaker_candidates: true
  allow_full_prompt_logging: false
  allow_raw_payload_cache: false

paths:
  personal_lifelog_rag: "~/MyApplication/personal_lifelog_rag"
  notes_lifelog_rag: "~/MyApplication/notes_lifelog_rag"
  relationship_db: "~/MyApplication/relationship_lifelog_agent/data/relationship.sqlite"
  personal_lifelog_db: null
  notes_lifelog_db: null
  personal_lifelog_export_dir: null
  notes_lifelog_export_dir: null

ui:
  style: chatgpt_like
  show_sidebar: false
  show_debug_by_default: false
  show_evidence_collapsed: true
  max_evidence_items: 8
  stream_progress: true
  show_progress_messages: true
  show_tool_usage: true
  show_safe_reasoning_summary: true
  show_raw_llm_thinking: false
  progress_messages_collapsed_when_done: true

relationship:
  default_profile_id: 1
  post_conflict_window_days: 14
  surrounding_media_days_before: 1
  surrounding_media_days_after: 1
  conflict_min_confidence: 0.45
  evidence_min_strength_for_answer: 0.35
  require_manual_partner_label: true

privacy:
  public_mode_enabled: false
  redact_exact_gps: true
  redact_line_full_text: true
  redact_note_full_text: true
  allow_short_quotes_private: true
  max_private_quote_chars: 120
  forbid_public_relationship_labels: true

llm:
  provider: ollama
  model: null
  base_url: "http://127.0.0.1:11434"
  temperature: 0.2
  num_ctx: 32768
  max_context_items: 30
  enabled: false
  require_structured_output: true
  fallback_to_rules: true
  use_for_question_understanding: false
  use_for_information_needs: false
  use_for_query_planning: false
  use_for_answer_composition: false
  timeout_seconds: 120

vision:
  enabled: false
  provider: ollama
  model: null
  pass_images: false
  pass_face_crops: false
  max_images_per_batch: 10
